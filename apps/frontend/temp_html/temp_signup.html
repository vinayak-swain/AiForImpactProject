<main class="flex-grow flex items-center justify-center px-4 py-24">

<span>Google</span>
</button>
<button class="flex items-center justify-center gap-2 py-3 px-4 rounded-full border border-outline hover:border-secondary transition-all duration-200 font-medium bouncy-hover bg-surface-container-low text-on-surface">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">terminal</span>
<span>GitHub</span>
</button>
</div>
<div class="relative flex items-center mb-8">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink mx-4 text-xs text-on-surface-variant font-bold uppercase tracking-widest">or</span>

<form class="space-y-5" id="signup-form">

<button class="exp-btn flex-1 py-3 px-2 rounded-full text-xs font-bold transition-all text-on-surface-variant" data-level="Mid-Level" type="button">Mid</button>
<button class="exp-btn flex-1 py-3 px-2 rounded-full text-xs font-bold transition-all text-on-surface-variant" data-level="Senior" type="button">Sen</button>

</div>
</div>
<button class="w-full py-4 bg-primary text-white font-black text-lg rounded-full celestial-shadow-primary bouncy-hover transition-all duration-300 mt-4 hover:bg-[#1a5f7a]" type="submit">
                Create Account
            </button>

<div class="mt-8 text-center">

</p>

<footer class="flex flex-col md:flex-row justify-between items-center w-full px-6 py-8 mt-auto bg-transparent">
<div class="text-lg font-bold text-secondary mb-4 md:mb-0">TechPrep AI</div>
<div class="flex gap-6 mb-4 md:mb-0">
<a class="text-on-surface-variant font-body text-sm hover:text-secondary transition-colors" href="#">Privacy</a>
<a class="text-on-surface-variant font-body text-sm hover:text-secondary transition-colors" href="#">Terms</a>
<a class="text-on-surface-variant font-body text-sm hover:text-secondary transition-colors" href="#">Support</a>
</div>
<div class="text-on-surface-variant opacity-60 font-body text-sm">
        © 2024 TechPrep AI. Celestial Intelligence Edition.
    </div>
</footer>
<script>
    // Particle Background Logic
    const canvas = document.getElementById('fluid-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    window.addEventListener('resize', resize);
    resize();

    class Particle {
        constructor() {
            this.init();
        }
        init() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 3 + 1;
            this.speedX = (Math.random() - 0.5) * 0.8;
            this.speedY = (Math.random() - 0.5) * 0.8;
            this.color = Math.random() > 0.5 ? '#124E66' : '#E64833';
            this.opacity = Math.random() * 0.4 + 0.2;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;

            if (this.x > canvas.width || this.x < 0) this.speedX *= -1;
            if (this.y > canvas.height || this.y < 0) this.speedY *= -1;
        }
        draw() {
            ctx.globalAlpha = this.opacity;
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    function initParticles() {
        particles = [];
        for (let i = 0; i < 60; i++) {
            particles.push(new Particle());
        }
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => {
            p.update();
            p.draw();
        });
        requestAnimationFrame(animate);
    }

    initParticles();
    animate();

    // Experience Selector Logic
    const expButtons = document.querySelectorAll('.exp-btn');
    expButtons.forEach(btn => {
        btn.addEventListener('click', () => {
            expButtons.forEach(b => {
                b.classList.remove('bg-secondary', 'shadow-sm', 'text-white');
                b.classList.add('text-on-surface-variant');
            });
            btn.classList.add('bg-secondary', 'shadow-sm', 'text-white');
            btn.classList.remove('text-on-surface-variant');
        });
    });

    // Form Submission Effect
    const form = document.getElementById('signup-form');
    form.addEventListener('submit', (e) => {
        e.preventDefault();
        const btn = form.querySelector('button[type="submit"]');
        btn.innerHTML = '<span>Processing...</span>';
        btn.classList.add('opacity-80');
        setTimeout(() => {
            btn.innerHTML = 'Account Ready ✨';
            btn.classList.remove('bg-primary');
            btn.classList.add('bg-secondary');
            btn.classList.remove('opacity-80');
        }, 1200);
    });
</script>
